name: Lean CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # -------------------------------
      # Environment hardening
      # -------------------------------
      - name: Set strict shell mode
        run: |
          echo "SHELL=/usr/bin/bash -euxo pipefail" >> $GITHUB_ENV

      # -------------------------------
      # Install Lean toolchain
      # -------------------------------
      - name: Install elan (Lean version manager)
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Verify Lean installation
        run: lean --version

      # -------------------------------
      # Independence invariants
      # (semantic guardrail)
      # -------------------------------
      - name: Check Independence invariants
        run: |
          ./Scripts/check_independence.sh

      # -------------------------------
      # Lake + Lean build
      # -------------------------------
      - name: Lake update
        run: lake update

      - name: Lake build
        run: lake build
