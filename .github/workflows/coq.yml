name: Coq CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Coq
        uses: coq-community/docker-coq-action@v1
        with:
          coq_version: '8.19'

      - name: Build Coq files
        run: |
          coqc -q -R coq StandingAlgebra \
            coq/StandingAlgebraCoreCoq.v \
            coq/StandingAlgebraBasicsCoq.v \
            coq/StandingAlgebra_Model_Example.v
